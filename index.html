<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <title>Backstage — закрытое сообщество музыкантов</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>
<body>
<div class="app-wrapper" id="appRoot"></div>

<script>
  // ========== НАСТРОЙКИ ==========
  const API_BASE = 'http://localhost:3001/api';
  
  // ========== ХРАНИЛИЩЕ ==========
  let users = [];
  let invites = [];
  let posts = [];
  let currentUser = null;
  let currentGenreFilter = null;
  let viewingUserId = null;
  
  // ========== ЗАГРУЗКА ДАННЫХ ==========
  async function loadInvites() {
    const response = await fetch(`${API_BASE}/invites`, { cache: 'no-store' });
    invites = await response.json();
    console.log('📋 Загружены инвайты:', invites);
  }
  
  async function loadUsers() {
    const response = await fetch(`${API_BASE}/users`);
    users = await response.json();
    console.log('👥 Загружены пользователи:', users);
  }
  
  async function loadPosts() {
    const response = await fetch(`${API_BASE}/posts`);
    const rawPosts = await response.json();
    posts = rawPosts.map(p => ({ ...p, tags: JSON.parse(p.tags) }));
    console.log('📝 Загружены посты:', posts.length);
  }
  
  // ========== АУТЕНТИФИКАЦИЯ ==========
  async function login(email, password) {
    const response = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    return response.json();
  }
  
  async function register(email, password, name, inviteCode, instruments, city, about, genres) {
    const response = await fetch(`${API_BASE}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, name, inviteCode, instruments, city, about, genres })
    });
    return response.json();
  }
  
  async function forgotPassword(email) {
    const response = await fetch(`${API_BASE}/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    return response.json();
  }
  
  async function resetPassword(token, newPassword) {
    const response = await fetch(`${API_BASE}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword })
    });
    return response.json();
  }
  
  async function uploadAudio(file) {
    const formData = new FormData();
    formData.append('audio', file);
    
    const response = await fetch(`${API_BASE}/upload-audio`, {
      method: 'POST',
      body: formData
    });
    return response.json();
  }
  
  // ========== СОХРАНЕНИЕ ==========
  async function updateUserOnServer(userId, updates) {
    const response = await fetch(`${API_BASE}/users/${userId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    return response.ok;
  }
  
  async function savePostToServer(post) {
    const response = await fetch(`${API_BASE}/posts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(post)
    });
    return response.ok;
  }
  
  async function updatePostOnServer(postId, updates) {
    const response = await fetch(`${API_BASE}/posts/${postId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    return response.ok;
  }
  
  async function deletePostOnServer(postId) {
    const response = await fetch(`${API_BASE}/posts/${postId}`, {
      method: 'DELETE'
    });
    return response.ok;
  }
  
  async function saveInviteToServer(code, createdBy) {
    const response = await fetch(`${API_BASE}/invites`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, created_by: createdBy })
    });
    return response.ok;
  }
  
  // ========== ЛОГИКА ПРИЛОЖЕНИЯ ==========
  async function initStorage() {
    await loadInvites();
    await loadUsers();
    await loadPosts();
  }
  
  function saveAllData() {
    if (currentUser) {
      localStorage.setItem('backstage_current_user', JSON.stringify(currentUser));
    }
  }
  
  function getUserById(id) {
    return users.find(u => u.id === id);
  }
  
  function getAuthorName(userId) {
    const user = users.find(u => u.id === userId);
    return user ? user.name : 'Участник';
  }
  
  function getMyInvites() {
    if (!currentUser) return [];
    return invites.filter(inv => inv.created_by === currentUser.id);
  }
  
  function getInvitedUsers() {
    const myInvites = getMyInvites();
    const invitedIds = myInvites.filter(inv => inv.used_by).map(inv => inv.used_by);
    return users.filter(u => invitedIds.includes(u.id));
  }
  
  function getAvailableInvitesCount() {
    const invitedCount = getInvitedUsers().length;
    return 1 + invitedCount;
  }
  
  function generateInviteCode() {
    return 'BACKSTAGE_' + Math.random().toString(36).substring(2, 10).toUpperCase();
  }
  
  async function createInvite() {
    if (!currentUser) return null;
    const code = generateInviteCode();
    const success = await saveInviteToServer(code, currentUser.id);
    if (success) {
      invites.push({
        code: code,
        created_by: currentUser.id,
        used_by: null,
        used_at: null,
        created_at: Date.now()
      });
      return code;
    }
    return null;
  }
  
  async function updateProfile(userId, updates) {
    const success = await updateUserOnServer(userId, updates);
    if (success) {
      const userIndex = users.findIndex(u => u.id === userId);
      if (userIndex !== -1) {
        users[userIndex] = { ...users[userIndex], ...updates };
        if (currentUser && currentUser.id === userId) {
          currentUser = users[userIndex];
          saveAllData();
        }
      }
      return true;
    }
    return false;
  }
  
  async function addPost(type, title, description, tagsRaw, audioUrl) {
    if (!currentUser) return false;
    const tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t);
    const newPost = {
      id: Date.now().toString(),
      user_id: currentUser.id,
      type: type,
      title: title,
      description: description,
      tags: JSON.stringify(tags),
      audio_url: audioUrl || null,
      created_at: Date.now(),
      status: "active"
    };
    const success = await savePostToServer(newPost);
    if (success) {
      posts.unshift({ ...newPost, tags: tags });
      return true;
    }
    return false;
  }
  
  async function updatePost(postId, updates) {
    const success = await updatePostOnServer(postId, updates);
    if (success) {
      const postIndex = posts.findIndex(p => p.id === postId);
      if (postIndex !== -1) {
        posts[postIndex] = { ...posts[postIndex], ...updates };
      }
      return true;
    }
    return false;
  }
  
  async function deletePost(postId) {
    const success = await deletePostOnServer(postId);
    if (success) {
      const postIndex = posts.findIndex(p => p.id === postId);
      if (postIndex !== -1) {
        posts[postIndex].status = "deleted";
      }
      return true;
    }
    return false;
  }
  
  function getUserPosts(userId, includeDeleted = false) {
    let userPosts = posts.filter(p => p.user_id === userId);
    if (!includeDeleted) {
      userPosts = userPosts.filter(p => p.status === "active");
    }
    return userPosts.sort((a, b) => b.created_at - a.created_at);
  }
  
  function sendMessageToAuthor(authorId, authorName, message) {
    console.log(`📨 Сообщение от ${currentUser.name} для ${authorName}: ${message}`);
    alert(`Сообщение отправлено!\n\nКому: ${authorName}\nСообщение: ${message}\n\n(в реальном приложении здесь будет отправка на сервер и уведомление автору)`);
  }
  
  function showChatModal(authorId, authorName) {
    const modal = document.createElement('div');
    modal.className = 'chat-modal';
    modal.innerHTML = `
      <div class="chat-modal-card">
        <h3 style="margin-bottom: 8px;">Сообщение для ${escapeHtml(authorName)}</h3>
        <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;">Ваше сообщение будет отправлено автору объявления</p>
        <textarea id="chatMessage" rows="4" placeholder="Напишите своё предложение, вопрос или приглашение..."></textarea>
        <div style="display: flex; gap: 12px; margin-top: 12px;">
          <button id="sendChatBtn" class="btn-primary" style="flex:1;">Отправить</button>
          <button id="cancelChatBtn" class="btn-secondary" style="flex:1;">Отмена</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modal.style.display = 'flex';
    
    document.getElementById('sendChatBtn').onclick = () => {
      const message = document.getElementById('chatMessage').value.trim();
      if (!message) {
        alert('Введите сообщение');
        return;
      }
      sendMessageToAuthor(authorId, authorName, message);
      modal.remove();
    };
    
    document.getElementById('cancelChatBtn').onclick = () => {
      modal.remove();
    };
    
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.remove();
    });
  }
  
  // ========== ПРОСМОТР ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ ==========
  function viewUserProfile(userId) {
    viewingUserId = userId;
    renderUserProfileScreen();
    setActiveScreen('profile');
  }
  
  function renderUserProfileScreen() {
    const user = users.find(u => u.id === viewingUserId);
    if (!user) return;
    
    const container = document.getElementById('profileScreen');
    if (!container) return;
    
    const rating = user.rating || 0;
    const genres = user.genres || '';
    const genreList = genres ? genres.split(',').map(g => g.trim()) : [];
    const daysInCommunity = Math.floor((Date.now() - user.created_at) / (1000 * 60 * 60 * 24));
    
    container.innerHTML = `
      <div style="margin-bottom: 16px;">
        <button id="backFromProfileBtn" class="back-to-profile-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Назад
        </button>
      </div>
      <div class="profile-header-card">
        <div class="profile-avatar">${user.name.charAt(0)}</div>
        <div class="profile-name">${escapeHtml(user.name)}</div>
        <div class="profile-bio">${escapeHtml(user.instruments || 'Инструменты не указаны')} ${user.instruments && user.city ? '·' : ''} ${escapeHtml(user.city || 'Город не указан')}</div>
        ${genreList.length > 0 ? `<div class="profile-genres">${genreList.map(g => `<span class="genre-badge">${escapeHtml(g)}</span>`).join('')}</div>` : ''}
        <div class="profile-rating" style="margin-top: 8px;">
           <strong>${rating}</strong> очков репутации
          <span style="margin-left: 16px;"> в сообществе ${daysInCommunity} дней</span>
        </div>
        ${user.about ? `<div class="profile-about" style="margin-top: 16px;">${escapeHtml(user.about)}</div>` : ''}
        <button class="profile-edit-btn" id="messageToUserBtn" style="margin-top: 20px;">
          <i class="fa-regular fa-message"></i> Написать сообщение
        </button>
      </div>
    `;
    
    document.getElementById('backFromProfileBtn').onclick = () => {
      viewingUserId = null;
      setActiveScreen('feed');
      renderFeed();
    };
    
    document.getElementById('messageToUserBtn').onclick = () => {
      showChatModal(user.id, user.name);
    };
  }
  
  function renderUserProfileTabContent(tab, user) {
    const content = document.getElementById('profileTabContent');
    if (!content) return;
    
    if (tab === 'info') {
      content.innerHTML = `
        <div class="profile-info-card">
          <div class="info-row"><span class="info-label">Инструменты:</span><span>${escapeHtml(user.instruments || 'не указано')}</span></div>
          <div class="info-row"><span class="info-label">Город:</span><span>${escapeHtml(user.city || 'не указан')}</span></div>
          <div class="info-row"><span class="info-label">Жанры:</span><span>${escapeHtml(user.genres || 'не указаны')}</span></div>
          <div class="info-row"><span class="info-label">В сообществе:</span><span>${Math.floor((Date.now() - user.created_at) / (1000*60*60*24*30))} месяцев</span></div>
          <div class="info-row"><span class="info-label">Рейтинг:</span><span><i class="fa-solid fa-star rating-star"></i> ${user.rating || 0}</span></div>
        </div>
      `;
    } else if (tab === 'posts') {
      const userPosts = getUserPosts(user.id, true);
      if (userPosts.length === 0) {
        content.innerHTML = '<div class="empty-state"><i class="fa-regular fa-newspaper"></i><p>У пользователя пока нет объявлений</p></div>';
        return;
      }
      
      content.innerHTML = userPosts.map(post => `
        <div class="my-post-card ${post.status === 'deleted' ? 'deleted' : ''}">
          <div class="my-post-header">
            ${getBadgeHTML(post.type)}
            ${post.status === 'deleted' ? '<span class="deleted-badge">Скрыто</span>' : ''}
          </div>
          <div class="my-post-title">${escapeHtml(post.title)}</div>
          <div class="my-post-meta">${formatDate(post.created_at)}</div>
          <div class="my-post-desc">${escapeHtml(post.description)}</div>
        </div>
      `).join('');
    }
  }
  
  // ========== ПОИСК ==========
  let searchQuery = '';
  let searchTypeFilter = null;
  let searchCity = '';
  let searchGenre = '';
  let searchActiveTab = 'posts';
  
  function performSearch() {
    let filteredPosts = posts.filter(p => p.status === 'active');
    
    if (searchQuery) {
      const query = searchQuery.toLowerCase();
      filteredPosts = filteredPosts.filter(p => 
        p.title.toLowerCase().includes(query) || 
        p.description.toLowerCase().includes(query)
      );
    }
    
    if (searchTypeFilter) {
      filteredPosts = filteredPosts.filter(p => p.type === searchTypeFilter);
    }
    
    if (searchCity) {
      filteredPosts = filteredPosts.filter(p => {
        const author = users.find(u => u.id === p.user_id);
        return author && author.city && author.city.toLowerCase().includes(searchCity.toLowerCase());
      });
    }
    
    if (searchGenre) {
      filteredPosts = filteredPosts.filter(p => {
        const author = users.find(u => u.id === p.user_id);
        return author && author.genres && author.genres.toLowerCase().includes(searchGenre.toLowerCase());
      });
    }
    
    let filteredUsers = users.filter(u => u.id !== currentUser?.id);
    
    if (searchQuery) {
      const query = searchQuery.toLowerCase();
      filteredUsers = filteredUsers.filter(u => 
        u.name.toLowerCase().includes(query) || 
        (u.instruments && u.instruments.toLowerCase().includes(query))
      );
    }
    
    if (searchCity) {
      filteredUsers = filteredUsers.filter(u => 
        u.city && u.city.toLowerCase().includes(searchCity.toLowerCase())
      );
    }
    
    if (searchGenre) {
      filteredUsers = filteredUsers.filter(u => 
        u.genres && u.genres.toLowerCase().includes(searchGenre.toLowerCase())
      );
    }
    
    renderSearchResults(filteredPosts, filteredUsers);
  }
  
  function renderSearchResults(filteredPosts, filteredUsers) {
    const container = document.getElementById('searchResults');
    if (!container) return;
    
    if (searchActiveTab === 'posts') {
      if (filteredPosts.length === 0) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">Постов не найдено</div>';
        return;
      }
      
      container.innerHTML = filteredPosts.map(post => {
        const author = users.find(u => u.id === post.user_id);
        return `
          <div class="search-result-card" data-post-id="${post.id}">
            <div class="search-result-title">${getBadgeHTML(post.type)} ${escapeHtml(post.title)}</div>
            <div class="search-result-meta">
              <span class="clickable-name" data-user-id="${post.user_id}">${escapeHtml(author?.name || 'Участник')}</span> · ${formatDate(post.created_at)}
              ${author?.city ? ` · ${escapeHtml(author.city)}` : ''}
              ${author?.genres ? ` · ${escapeHtml(author.genres)}` : ''}
            </div>
            <div class="search-result-meta" style="margin-top:6px;">${escapeHtml(post.description.substring(0, 100))}${post.description.length > 100 ? '...' : ''}</div>
          </div>
        `;
      }).join('');
      
      document.querySelectorAll('.search-result-card[data-post-id]').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('clickable-name')) return;
          const postId = card.getAttribute('data-post-id');
          const post = posts.find(p => p.id === postId);
          if (post) {
            currentFilter = null;
            currentGenreFilter = null;
            renderFeed();
            setActiveScreen('feed');
            setTimeout(() => {
              const feedContainer = document.getElementById('feedList');
              if (feedContainer) feedContainer.scrollIntoView({ behavior: 'smooth' });
            }, 100);
          }
        });
      });
      
      document.querySelectorAll('.clickable-name').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const userId = el.getAttribute('data-user-id');
          viewUserProfile(userId);
        });
      });
    } else {
      if (filteredUsers.length === 0) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">Пользователей не найдено</div>';
        return;
      }
      
      container.innerHTML = filteredUsers.map(user => `
        <div class="search-result-card" data-user-id="${user.id}">
          <div class="search-result-title clickable-name" data-user-id="${user.id}">${escapeHtml(user.name)}</div>
          <div class="search-result-meta">
            ${user.instruments ? escapeHtml(user.instruments) : 'Инструменты не указаны'}
            ${user.city ? ` · ${escapeHtml(user.city)}` : ''}
            ${user.genres ? ` · ${escapeHtml(user.genres)}` : ''}
          </div>
          <div class="search-result-meta" style="margin-top:6px;">${user.about ? escapeHtml(user.about.substring(0, 100)) : 'Нет описания'}</div>
        </div>
      `).join('');
      
      document.querySelectorAll('.search-result-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('clickable-name')) return;
          const userId = card.getAttribute('data-user-id');
          viewUserProfile(userId);
        });
      });
      
      document.querySelectorAll('.clickable-name').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const userId = el.getAttribute('data-user-id');
          viewUserProfile(userId);
        });
      });
    }
  }
  
  function renderSearchScreen() {
    const container = document.getElementById('searchScreen');
    if (!container) return;
    
    const cities = [...new Set(users.filter(u => u.city).map(u => u.city))];
    const genres = [...new Set(users.filter(u => u.genres).flatMap(u => u.genres.split(',').map(g => g.trim())))];
    
    container.innerHTML = `
      <div class="search-container">
        <div class="search-input-wrapper">
          <input type="text" id="searchInput" placeholder="Поиск по постам и пользователям..." value="${escapeHtml(searchQuery)}">
          <button id="searchBtn"><i class="fa-solid fa-search"></i></button>
        </div>
        
        <div class="search-filters">
          <select id="searchTypeFilter" class="search-filter-select">
            <option value="">Все типы</option>
            <option value="work" ${searchTypeFilter === 'work' ? 'selected' : ''}>Вакансии</option>
            <option value="gear" ${searchTypeFilter === 'gear' ? 'selected' : ''}>Оборудование</option>
            <option value="discourse" ${searchTypeFilter === 'discourse' ? 'selected' : ''}>Дискурс</option>
          </select>
          
          <select id="searchCity" class="search-filter-select">
            <option value="">Все города</option>
            ${cities.map(c => `<option value="${escapeHtml(c)}" ${searchCity === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
          </select>
          
          <select id="searchGenre" class="search-filter-select">
            <option value="">Все жанры</option>
            ${genres.map(g => `<option value="${escapeHtml(g)}" ${searchGenre === g ? 'selected' : ''}>${escapeHtml(g)}</option>`).join('')}
          </select>
        </div>
        
        <div class="search-tabs">
          <div class="search-tab ${searchActiveTab === 'posts' ? 'active' : ''}" data-tab="posts">Посты</div>
          <div class="search-tab ${searchActiveTab === 'users' ? 'active' : ''}" data-tab="users">Пользователи</div>
        </div>
        
        <div id="searchResults" class="search-results-section"></div>
      </div>
    `;
    
    document.getElementById('searchBtn').onclick = () => {
      searchQuery = document.getElementById('searchInput').value;
      searchTypeFilter = document.getElementById('searchTypeFilter').value || null;
      searchCity = document.getElementById('searchCity').value;
      searchGenre = document.getElementById('searchGenre').value;
      performSearch();
    };
    
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchQuery = e.target.value;
        searchTypeFilter = document.getElementById('searchTypeFilter').value || null;
        searchCity = document.getElementById('searchCity').value;
        searchGenre = document.getElementById('searchGenre').value;
        performSearch();
      }
    });
    
    document.getElementById('searchTypeFilter').onchange = () => {
      searchQuery = document.getElementById('searchInput').value;
      searchTypeFilter = document.getElementById('searchTypeFilter').value || null;
      searchCity = document.getElementById('searchCity').value;
      searchGenre = document.getElementById('searchGenre').value;
      performSearch();
    };
    
    document.getElementById('searchCity').onchange = () => {
      searchQuery = document.getElementById('searchInput').value;
      searchTypeFilter = document.getElementById('searchTypeFilter').value || null;
      searchCity = document.getElementById('searchCity').value;
      searchGenre = document.getElementById('searchGenre').value;
      performSearch();
    };
    
    document.getElementById('searchGenre').onchange = () => {
      searchQuery = document.getElementById('searchInput').value;
      searchTypeFilter = document.getElementById('searchTypeFilter').value || null;
      searchCity = document.getElementById('searchCity').value;
      searchGenre = document.getElementById('searchGenre').value;
      performSearch();
    };
    
    document.querySelectorAll('.search-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        searchActiveTab = tab.getAttribute('data-tab');
        renderSearchScreen();
        performSearch();
      });
    });
    
    performSearch();
  }
  
  // ========== UI КОМПОНЕНТЫ ==========
  const typeIcons = {
    work: `<svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>`,
    gear: `<svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
    discourse: `<svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`
  };
  
  function formatDate(timestamp) {
    const date = new Date(timestamp);
    return `${date.getDate()} ${date.toLocaleString('ru',{month:'short'})} · ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
  }
  
  function getBadgeHTML(type) {
    const labels = { work: 'вакансия', gear: 'оборудование', discourse: 'дискурс' };
    const classes = { work: 'work', gear: 'gear', discourse: 'discourse' };
    return `<span class="badge-type ${classes[type]}" data-type="${type}">${typeIcons[type]}<span class="badge-text">${labels[type]}</span></span>`;
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }
  
  let currentFilter = null;
  
  function renderFeed() {
    const container = document.getElementById('feedList');
    if (!container) return;
    
    let filtered = posts.filter(p => p.status === "active");
    if (currentFilter) {
      filtered = filtered.filter(p => p.type === currentFilter);
    }
    if (currentGenreFilter) {
      filtered = filtered.filter(p => {
        const author = users.find(u => u.id === p.user_id);
        return author && author.genres && author.genres.toLowerCase().includes(currentGenreFilter.toLowerCase());
      });
    }
    
    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">Нет публикаций · создайте первую</div>';
      return;
    }
    
    container.innerHTML = filtered.map(post => {
      const authorName = getAuthorName(post.user_id);
      const hasAudio = post.audio_url && post.audio_url !== '';
      
      return `
        <div class="post-card">
          <div class="post-header">
            ${getBadgeHTML(post.type)}
            <span class="verified-mark clickable-name" data-user-id="${post.user_id}">${escapeHtml(authorName)} · проверен</span>
          </div>
          <div class="post-title">${escapeHtml(post.title)}</div>
          <div class="post-meta">${formatDate(post.created_at)}</div>
          <div class="post-desc">${escapeHtml(post.description)}</div>
          ${hasAudio ? `
            <div class="demo-player">
              <button class="play-demo-btn" data-audio-url="${post.audio_url}">
                <i class="fa-solid fa-music"></i> <span class="demo-time">00:00 / 00:00</span>
              </button>
              <audio class="demo-audio" preload="none" style="display: none;">
                <source src="${post.audio_url}" type="audio/mpeg">
              </audio>
            </div>
          ` : ''}
          <hr />
          <div class="chat-action" data-author-id="${post.user_id}" data-author-name="${escapeHtml(authorName)}">
            <i class="fa-regular fa-message"></i> Написать в чат
          </div>
        </div>
      `;
    }).join('');
    
    // Инициализация аудиоплееров
    document.querySelectorAll('.play-demo-btn').forEach(btn => {
      const demoDiv = btn.parentElement;
      const audio = demoDiv.querySelector('.demo-audio');
      if (!audio) return;
      
      // Получаем длительность
      audio.addEventListener('loadedmetadata', () => {
        const minutes = Math.floor(audio.duration / 60);
        const seconds = Math.floor(audio.duration % 60);
        btn.querySelector('.demo-time').innerHTML = `00:00 / ${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
      });
      
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (audio.paused) {
          // Останавливаем все другие аудио
          document.querySelectorAll('.demo-audio').forEach(a => {
            if (a !== audio && !a.paused) {
              a.pause();
              const otherBtn = a.closest('.demo-player')?.querySelector('.play-demo-btn');
              if (otherBtn) otherBtn.innerHTML = '<i class="fa-solid fa-music"></i> <span class="demo-time">00:00 / 00:00</span>';
            }
          });
          audio.play();
          btn.innerHTML = '<i class="fa-solid fa-pause"></i> <span class="demo-time">00:00 / 00:00</span>';
        } else {
          audio.pause();
          btn.innerHTML = '<i class="fa-solid fa-music"></i> <span class="demo-time">00:00 / 00:00</span>';
        }
      });
      
      audio.addEventListener('timeupdate', () => {
        const currentMinutes = Math.floor(audio.currentTime / 60);
        const currentSeconds = Math.floor(audio.currentTime % 60);
        const totalMinutes = Math.floor(audio.duration / 60);
        const totalSeconds = Math.floor(audio.duration % 60);
        btn.querySelector('.demo-time').innerHTML = `${currentMinutes.toString().padStart(2,'0')}:${currentSeconds.toString().padStart(2,'0')} / ${totalMinutes.toString().padStart(2,'0')}:${totalSeconds.toString().padStart(2,'0')}`;
      });
      
      audio.addEventListener('ended', () => {
        btn.innerHTML = '<i class="fa-solid fa-music"></i> <span class="demo-time">00:00 / 00:00</span>';
      });
    });
    
    document.querySelectorAll('.chat-action').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const authorId = el.getAttribute('data-author-id');
        const authorName = el.getAttribute('data-author-name');
        showChatModal(authorId, authorName);
      });
    });
    
    document.querySelectorAll('.clickable-name').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const userId = el.getAttribute('data-user-id');
        if (userId) viewUserProfile(userId);
      });
    });
    
    document.querySelectorAll('.filter-badge').forEach(b => {
      const type = b.getAttribute('data-type');
      if (currentFilter === type) b.classList.add('active');
      else b.classList.remove('active');
    });
  }
  
  function setActiveScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(`${screenId}Screen`);
    if (target) target.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    const activeNav = document.querySelector(`.nav-item[data-screen="${screenId}"]`);
    if (activeNav) activeNav.classList.add('active');
    
    if (screenId === 'feed' || screenId === 'search' || screenId === 'profile') {
      viewingUserId = null;
    }
    
    if (screenId === 'search') {
      renderSearchScreen();
    }
  }
  
  // ========== ПРОФИЛЬ (СВОЙ) ==========
  let profileActiveTab = "info";
  
  function renderProfileScreen() {
  	if (document.querySelector('.nav-item.active')?.getAttribute('data-screen') === 'profile') {
  	    viewingUserId = null;
  	  }

    }

    const genreList = genres ? genres.split(',').map(g => g.trim()) : [];
    
    container.innerHTML = `
      <div class="profile-header-card">
        <div class="profile-avatar">${currentUser.name.charAt(0)}</div>
        <div class="profile-name">${escapeHtml(currentUser.name)}</div>

        <div class="profile-rating">
          <i class="fa-solid fa-star rating-star"></i> <strong>${rating}</strong> <span style="font-size:12px;">очков репутации</span>
        </div>
        ${genreList.length > 0 ? `<div class="profile-genres">${genreList.map(g => `<span class="genre-badge">${escapeHtml(g)}</span>`).join('')}</div>` : ''}
        ${currentUser.about ? `<div class="profile-about">${escapeHtml(currentUser.about)}</div>` : ''}
        <button class="profile-edit-btn" id="editProfileBtnGlobal"><i class="fa-regular fa-pen-to-square"></i> Редактировать</button>

      <div class="profile-tabs">

        <button class="profile-tab ${profileActiveTab === 'invites' ? 'active' : ''}" data-tab="invites">Приглашения</button>

      <div class="profile-tab-content" id="profileTabContent"></div>

    document.querySelectorAll('.profile-tab').forEach(tab => {
      tab.addEventListener('click', () => {

    const editBtn = document.getElementById('editProfileBtnGlobal');
    if (editBtn) editBtn.onclick = () => showEditProfileModal();
    
    renderProfileTabContent();

    if (profileActiveTab === 'info') {
      content.innerHTML = `
        <div class="profile-info-card">
          <div class="info-row"><span class="info-label">Инструменты:</span><span>${escapeHtml(currentUser.instruments || 'не указано')}</span></div>
          <div class="info-row"><span class="info-label">Город:</span><span>${escapeHtml(currentUser.city || 'не указан')}</span></div>

          <div class="my-post-title">${escapeHtml(post.title)}</div>

          ${post.status === 'active' ? `
            <div class="my-post-actions">
              <button class="action-edit" data-id="${post.id}"><i class="fa-regular fa-pen-to-square"></i> Редактировать</button>

          <div id="newInviteResult" class="invite-result"></div>

              if (resultDiv) resultDiv.innerHTML = '';
            }, 15000);
          } else {
            alert('Не удалось создать инвайт');
          }
        };
      }
    }

  function showEditPostModal(post) {
    const modalHtml = `
      <div class="modal" id="editPostModal" style="display: flex;">
        <div class="modal-card">
          <h3>Редактировать объявление</h3>
          <div class="form-group"><label>Заголовок</label><input type="text" id="editPostTitle" value="${escapeHtml(post.title)}"></div>
          <div class="form-group"><label>Описание</label><textarea id="editPostDesc" rows="4">${escapeHtml(post.description)}</textarea></div>
          <div class="form-group"><label>Теги (через запятую)</label><input type="text" id="editPostTags" value="${(post.tags || []).join(', ')}"></div>
          <div class="modal-buttons">
            <button class="btn-secondary" id="cancelEditPost">Отмена</button>
            <button class="btn-primary" id="saveEditPost">Сохранить</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    const modal = document.getElementById('editPostModal');
    
    document.getElementById('cancelEditPost').onclick = () => modal.remove();
    document.getElementById('saveEditPost').onclick = async () => {
      const title = document.getElementById('editPostTitle').value.trim();
      const description = document.getElementById('editPostDesc').value.trim();
      const tagsRaw = document.getElementById('editPostTags').value;
      const tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t);
      
      if (!title || !description) {
        alert('Заголовок и описание обязательны');
        return;
      }
      
      await updatePost(post.id, { title, description, tags });
      await loadPosts();
      modal.remove();
      renderProfileScreen();
      renderFeed();
    };
  }

        if (!email || !password) {
          document.getElementById('authError').innerText = 'Заполните email и пароль';

        if (result.success) {
          currentUser = result.user;
          saveAllData();
          await loadPosts();
          renderMainApp();
        } else {
          document.getElementById('authError').innerText = result.error;

      document.getElementById('showRegisterBtn').onclick = () => {

  // ========== ОСНОВНОЕ ПРИЛОЖЕНИЕ ==========
  function renderMainApp() {
    const root = document.getElementById('appRoot');
    
    const allGenres = new Set();
    users.forEach(u => {
      if (u.genres) {
        u.genres.split(',').forEach(g => {
          const genre = g.trim();
          if (genre) allGenres.add(genre);
        });
      }
    });
    const genreList = Array.from(allGenres);
    
    root.innerHTML = `
      <div>
        <header class="app-header">
          <div class="logo">Back<span>stage</span></div>
          <button class="hamburger" id="hamburgerBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/>
              <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
              <circle cx="12" cy="18" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </button>
        </header>
        <div class="main-content">
          <div class="screen active" id="feedScreen">
            <div class="filters-bar">
              <span class="filter-badge work" data-type="work">${typeIcons.work}<span>вакансия</span></span>
              <span class="filter-badge gear" data-type="gear">${typeIcons.gear}<span>оборудование</span></span>
              <span class="filter-badge discourse" data-type="discourse">${typeIcons.discourse}<span>дискурс</span></span>
              <button class="reset-filter" id="resetFilterBtn"><i class="fa-regular fa-times"></i> всё</button>
            </div>
            ${genreList.length > 0 ? `
              <div class="genres-filter">
                <span style="font-size:0.7rem; color:var(--text-secondary);">Фильтр по жанрам:</span>
                <button class="genre-filter-btn ${currentGenreFilter === null ? 'active' : ''}" data-genre="">Все</button>
                ${genreList.map(g => `<button class="genre-filter-btn ${currentGenreFilter === g ? 'active' : ''}" data-genre="${escapeHtml(g)}">${escapeHtml(g)}</button>`).join('')}
              </div>
            ` : ''}
            <div class="feed-list" id="feedList"></div>
          </div>
          <div class="screen" id="searchScreen"></div>
          <div class="screen" id="profileScreen"></div>
        </div>
        <nav class="bottom-nav">
          <a href="#" class="nav-item active" data-screen="feed"><i class="fa-regular fa-rectangle-list nav-icon"></i><span>Лента</span></a>
          <a href="#" class="nav-item" data-screen="search"><i class="fa-regular fa-compass nav-icon"></i><span>Поиск</span></a>
          <a href="#" class="nav-item" data-screen="profile"><i class="fa-regular fa-user nav-icon"></i><span>Профиль</span></a>
        </nav>
        <button class="fab" id="fabBtn">+</button>
        <div class="modal" id="createModal">
          <div class="modal-card">
            <h3>Новая публикация</h3>
            <div class="form-group"><label>Тип</label><select id="postType"><option value="work">Вакансия / проект</option><option value="gear">Оборудование</option><option value="discourse">Дискурс</option></select></div>
            <div class="form-group"><label>Заголовок</label><input id="postTitle" placeholder="например: Ищем басиста"></div>
            <div class="form-group"><label>Описание</label><textarea id="postDesc" rows="3" placeholder="Подробности, условия..."></textarea></div>
            <div class="form-group"><label>Теги (через запятую)</label><input id="postTags" placeholder="гитара, сессия, студия"></div>
            <div class="form-group">
              <label>Демо (MP3, до 5 MB)</label>
              <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 12px;">
                <label class="custom-file-upload">
                   Выбрать файл
                  <input type="file" id="postAudio" accept="audio/mpeg" style="display: none;">
                </label>
                <span id="audioFileName" class="file-name">Файл не выбран</span>
              </div>
              <div id="audioUploadProgress" class="audio-upload-progress"></div>
            </div>
            <div class="modal-buttons"><button class="btn-secondary" id="cancelPost">Отмена</button><button class="btn-primary" id="submitPost">Опубликовать</button></div>
          </div>
        </div>
        </div>
        <div class="menu-overlay" id="menuOverlay"></div>
        <div class="side-menu" id="sideMenu">
          <div class="menu-item" data-action="profile"><i class="fa-regular fa-user"></i> Мой профиль</div>
          <div class="menu-item" data-action="invites"><i class="fa-regular fa-gem"></i> Мои приглашения</div>
          <div class="menu-item" data-action="notifications"><i class="fa-regular fa-bell"></i> Уведомления</div>
          <div style="margin: 16px 0; border-top:1px solid var(--border-light);"></div>
          <div class="menu-item" data-action="logout"><i class="fa-regular fa-arrow-right-from-bracket"></i> Выйти</div>
        </div>
      </div>
    `;
    
    renderFeed();
    attachEvents();
    renderProfileScreen();
  }
  
  async function attachEvents() {
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const screen = btn.getAttribute('data-screen');
        
        navItems.forEach(nav => nav.classList.remove('active'));
        btn.classList.add('active');
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const targetScreen = document.getElementById(`${screen}Screen`);
        if (targetScreen) targetScreen.classList.add('active');
        
        if (screen === 'profile') {
          viewingUserId = null;
          renderProfileScreen();
        }
        
        if (screen === 'search') {
          renderSearchScreen();
        }
      });
    });
    
    document.querySelectorAll('.filter-badge').forEach(b => {
      b.addEventListener('click', () => {
        const type = b.getAttribute('data-type');
        currentFilter = currentFilter === type ? null : type;
        renderFeed();
      });
    });
    
    document.querySelectorAll('.genre-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const genre = btn.getAttribute('data-genre');
        currentGenreFilter = genre === '' ? null : genre;
        renderFeed();
        document.querySelectorAll('.genre-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    
    const resetBtn = document.getElementById('resetFilterBtn');
    if (resetBtn) resetBtn.onclick = () => { currentFilter = null; renderFeed(); };
    
    document.addEventListener('click', (e) => {
      const badge = e.target.closest('.badge-type');
      if (badge && badge.getAttribute('data-type')) {
        const type = badge.getAttribute('data-type');
        currentFilter = currentFilter === type ? null : type;
        renderFeed();
      }
    });
    
    const fab = document.getElementById('fabBtn');
    const modal = document.getElementById('createModal');
    if (fab && modal) {
      fab.onclick = () => modal.style.display = 'flex';
      document.getElementById('cancelPost').onclick = () => modal.style.display = 'none';
      
      let uploadedAudioUrl = null;
      const audioInput = document.getElementById('postAudio');
      const progressDiv = document.getElementById('audioUploadProgress');
      
      audioInput.addEventListener('change', async (e) => {
      	const fileNameSpan = document.getElementById('audioFileName');
      	if (fileNameSpan && file) {
      	  fileNameSpan.textContent = file.name;
      	}
        const file = e.target.files[0];
        if (!file) return;
        
        if (file.size > 5 * 1024 * 1024) {
          progressDiv.innerHTML = '<span style="color:#c2410c;">Файл больше 5 MB</span>';
          audioInput.value = '';
          return;
        }
        
        progressDiv.innerHTML = '⏳ Загрузка...';
        const result = await uploadAudio(file);
        if (result.success) {
          uploadedAudioUrl = result.audioUrl;
          progressDiv.innerHTML = '✅ Демо загружено';
        } else {
          progressDiv.innerHTML = '<span style="color:#c2410c;">Ошибка загрузки</span>';
          audioInput.value = '';
        }
      });
      
      document.getElementById('submitPost').onclick = async () => {
        const type = document.getElementById('postType').value;
        const title = document.getElementById('postTitle').value.trim();
        const desc = document.getElementById('postDesc').value.trim();
        const tags = document.getElementById('postTags').value;
        
        if (!title || !desc) { 
          alert('Заголовок и описание обязательны'); 
          return; 
        }
        
        await addPost(type, title, desc, tags, uploadedAudioUrl);
        await loadPosts();
        modal.style.display = 'none';
        document.getElementById('postTitle').value = '';
        document.getElementById('postDesc').value = '';
        document.getElementById('postTags').value = '';
        audioInput.value = '';
        uploadedAudioUrl = null;
        progressDiv.innerHTML = '';
        renderFeed();
        setActiveScreen('feed');
      };
      
      window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    }
    
    const hamburger = document.getElementById('hamburgerBtn');
    const menu = document.getElementById('sideMenu');
    const overlay = document.getElementById('menuOverlay');
    if (hamburger && menu && overlay) {
      hamburger.onclick = () => { menu.classList.add('open'); overlay.style.display = 'block'; };
      overlay.onclick = () => { menu.classList.remove('open'); overlay.style.display = 'none'; };
    }
    
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const action = item.getAttribute('data-action');
        const menuEl = document.getElementById('sideMenu');
        const overlayEl = document.getElementById('menuOverlay');
        if (menuEl) menuEl.classList.remove('open');
        if (overlayEl) overlayEl.style.display = 'none';
        
        if (action === 'logout') {
          currentUser = null;
          localStorage.removeItem('backstage_current_user');
          authMode = 'login';
          showAuthScreen();
        } else if (action === 'profile') {
          viewingUserId = null;
          setActiveScreen('profile');
          renderProfileScreen();
        } else if (action === 'invites') {
          viewingUserId = null;
          setActiveScreen('profile');
          profileActiveTab = 'invites';
          renderProfileScreen();
        } else if (action === 'notifications') {
          alert('Уведомления скоро появятся');
        }
      });
    });
  }
  
  // ========== СТАРТ ==========
  async function startApp() {
    await initStorage();
    
    const savedUserId = localStorage.getItem('backstage_current_user');
    if (savedUserId) {
      try {
        const parsedUser = JSON.parse(savedUserId);
        const existingUser = users.find(u => u.id === parsedUser.id);
        if (existingUser) {
          currentUser = existingUser;
          renderMainApp();
          return;
        } else {
          localStorage.removeItem('backstage_current_user');
        }
      } catch(e) {
        localStorage.removeItem('backstage_current_user');
      }
    }
    
    showAuthScreen();
  }
  
  startApp();
</script>
</body>
</html>
