<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <title>ChiusoCLub — закрытое сообщество музыкантов</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
  <!-- WaveSurfer.js для визуализации аудио -->
  <script src="https://unpkg.com/wavesurfer.js@7.4.0/dist/wavesurfer.min.js"></script>
  <!-- Socket.io для реального времени -->
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper" id="appRoot"></div>

<script>
  // ========== НАСТРОЙКИ ==========
  const API_BASE = 'http://localhost:3001/api';
  
  // ========== ХРАНИЛИЩЕ ==========
  let users = [];
  let invites = [];
  let posts = [];
  let currentUser = null;
  let currentGenreFilter = null;
  let viewingUserId = null;
  let currentFeedMode = 'subscriptions'; // 'subscriptions' или 'all'
  let followingIds = []; // ID пользователей, на кого подписан текущий пользователь

  // Склонение числительных
  function getDeclension(number, one, two, five) {
    const n = Math.abs(number) % 100;
    const n1 = n % 10;
    if (n > 10 && n < 20) return five;
    if (n1 > 1 && n1 < 5) return two;
    if (n1 === 1) return one;
    return five;
  }
  
  // ========== ЗАГРУЗКА ДАННЫХ ==========
  async function loadInvites() {
    const response = await fetch(`${API_BASE}/invites`, { cache: 'no-store' });
    invites = await response.json();
    console.log('📋 Загружены инвайты:', invites);
  }
  
  async function loadUsers() {
    const response = await fetch(`${API_BASE}/users`);
    users = await response.json();
    console.log('👥 Загружены пользователи:', users);
  }
  
  async function loadPosts() {
    const response = await fetch(`${API_BASE}/posts`);
    const rawPosts = await response.json();
    posts = rawPosts.map(p => ({ ...p, tags: JSON.parse(p.tags) }));
    console.log('📝 Загружены посты:', posts.length);
  }
  
  // ========== АУТЕНТИФИКАЦИЯ ==========
  async function login(email, password) {
    const response = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    return response.json();
  }
  
  async function register(email, password, name, inviteCode, instruments, city, about, genres) {
    const response = await fetch(`${API_BASE}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, name, inviteCode, instruments, city, about, genres })
    });
    return response.json();
  }
  
  async function forgotPassword(email) {
    const response = await fetch(`${API_BASE}/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    return response.json();
  }
  
  async function resetPassword(token, newPassword) {
    const response = await fetch(`${API_BASE}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword })
    });
    return response.json();
  }
  
  async function uploadAudio(file) {
    const formData = new FormData();
    formData.append('audio', file);
    
    const response = await fetch(`${API_BASE}/upload-audio`, {
      method: 'POST',
      body: formData
    });
    return response.json();
  }
  
  // ========== СОХРАНЕНИЕ ==========
  async function updateUserOnServer(userId, updates) {
    const response = await fetch(`${API_BASE}/users/${userId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    return response.ok;
  }
  
  async function savePostToServer(post) {
    const response = await fetch(`${API_BASE}/posts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(post)
    });
    return response.ok;
  }
  
  async function updatePostOnServer(postId, updates) {
    const response = await fetch(`${API_BASE}/posts/${postId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    return response.ok;
  }
  
  async function deletePostOnServer(postId) {
    const response = await fetch(`${API_BASE}/posts/${postId}`, {
      method: 'DELETE'
    });
    return response.ok;
  }
  
  async function saveInviteToServer(code, createdBy) {
    const response = await fetch(`${API_BASE}/invites`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, created_by: createdBy })
    });
    return response.ok;
  }
  
  // ========== ЛОГИКА ПРИЛОЖЕНИЯ ==========
  async function initStorage() {
    await loadInvites();
    await loadUsers();
    await loadPosts();
    if (currentUser) {
      await loadFollowing();
    }
  }
  
  function saveAllData() {
    if (currentUser) {
      localStorage.setItem('backstage_current_user', JSON.stringify(currentUser));
    }
  }
  
  function getUserById(id) {
    return users.find(u => u.id === id);
  }
  
  function getAuthorName(userId) {
    const user = users.find(u => u.id === userId);
    return user ? user.name : 'Участник';
  }
  
  function getMyInvites() {
    if (!currentUser) return [];
    return invites.filter(inv => inv.created_by === currentUser.id);
  }
  
  function getInvitedUsers() {
    const myInvites = getMyInvites();
    const invitedIds = myInvites.filter(inv => inv.used_by).map(inv => inv.used_by);
    return users.filter(u => invitedIds.includes(u.id));
  }
  
  function getAvailableInvitesCount() {
    const invitedCount = getInvitedUsers().length;
    return 1 + invitedCount;
  }
  
  function generateInviteCode() {
    return 'CHIUSOCLUB_' + Math.random().toString(36).substring(2, 10).toUpperCase();
  }
  
  async function createInvite() {
    if (!currentUser) return null;
    const code = generateInviteCode();
    const success = await saveInviteToServer(code, currentUser.id);
    if (success) {
      invites.push({
        code: code,
        created_by: currentUser.id,
        used_by: null,
        used_at: null,
        created_at: Date.now()
      });
      return code;
    }
    return null;
  }
  
  async function updateProfile(userId, updates) {
    const success = await updateUserOnServer(userId, updates);
    if (success) {
      const userIndex = users.findIndex(u => u.id === userId);
      if (userIndex !== -1) {
        users[userIndex] = { ...users[userIndex], ...updates };
        if (currentUser && currentUser.id === userId) {
          currentUser = users[userIndex];
          saveAllData();
        }
      }
      return true;
    }
    return false;
  }
  
  async function addPost(type, title, description, tagsRaw, audioUrl) {
    if (!currentUser) return false;
    const tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t);
    const newPost = {
      id: Date.now().toString(),
      user_id: currentUser.id,
      type: type,
      title: title,
      description: description,
      tags: JSON.stringify(tags),
      audio_url: audioUrl || null,
      created_at: Date.now(),
      status: "active"
    };
    const success = await savePostToServer(newPost);
    if (success) {
      posts.unshift({ ...newPost, tags: tags });
      return true;
    }
    return false;
  }
  
  async function updatePost(postId, updates) {
    const success = await updatePostOnServer(postId, updates);
    if (success) {
      const postIndex = posts.findIndex(p => p.id === postId);
      if (postIndex !== -1) {
        posts[postIndex] = { ...posts[postIndex], ...updates };
      }
      return true;
    }
    return false;
  }
  
  async function deletePost(postId) {
    const success = await deletePostOnServer(postId);
    if (success) {
      const postIndex = posts.findIndex(p => p.id === postId);
      if (postIndex !== -1) {
        posts[postIndex].status = "deleted";
      }
      return true;
    }
    return false;
  }
  
  function getUserPosts(userId, includeDeleted = false) {
    let userPosts = posts.filter(p => p.user_id === userId);
    if (!includeDeleted) {
      userPosts = userPosts.filter(p => p.status === "active");
    }
    return userPosts.sort((a, b) => b.created_at - a.created_at);
  }
  
  function sendMessageToAuthor(authorId, authorName, message) {
    console.log(`📨 Сообщение от ${currentUser.name} для ${authorName}: ${message}`);
    alert(`Сообщение отправлено!\n\nКому: ${authorName}\nСообщение: ${message}\n\n(в реальном приложении здесь будет отправка на сервер и уведомление автору)`);
  }
  
  function showChatModal(authorId, authorName) {
    const modal = document.createElement('div');
    modal.className = 'chat-modal';
    modal.innerHTML = `
      <div class="chat-modal-card">
        <h3 style="margin-bottom: 8px;">Сообщение для ${escapeHtml(authorName)}</h3>
        <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;">Ваше сообщение будет отправлено автору объявления</p>
        <textarea id="chatMessage" rows="4" placeholder="Напишите своё предложение, вопрос или приглашение..."></textarea>
        <div style="display: flex; gap: 12px; margin-top: 12px;">
          <button id="sendChatBtn" class="btn-primary" style="flex:1;">Отправить</button>
          <button id="cancelChatBtn" class="btn-secondary" style="flex:1;">Отмена</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modal.style.display = 'flex';
    
    document.getElementById('sendChatBtn').onclick = () => {
      const message = document.getElementById('chatMessage').value.trim();
      if (!message) {
        alert('Введите сообщение');
        return;
      }
      sendMessageToAuthor(authorId, authorName, message);
      modal.remove();
    };
    
    document.getElementById('cancelChatBtn').onclick = () => {
      modal.remove();
    };
    
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.remove();
    });
  }

  // Модальное окно подтверждения
  function showConfirmModal(options) {
    const { title, message, confirmText, cancelText, onConfirm, onCancel } = options;
    
    const overlay = document.createElement('div');
    overlay.className = 'confirm-modal-overlay';
    overlay.innerHTML = `
      <div class="confirm-modal">
        <div class="confirm-modal-header">
          <div class="confirm-modal-title">
            <i class="fa-regular fa-circle-question"></i>
            <span>${escapeHtml(title || 'Подтверждение')}</span>
          </div>
        </div>
        <div class="confirm-modal-body">
          <p>${escapeHtml(message || 'Вы уверены?')}</p>
        </div>
        <div class="confirm-modal-footer">
          <button class="confirm-modal-cancel">${escapeHtml(cancelText || 'Отмена')}</button>
          <button class="confirm-modal-ok">${escapeHtml(confirmText || 'Удалить')}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    
    const closeModal = () => overlay.remove();
    
    overlay.querySelector('.confirm-modal-cancel').onclick = () => {
      closeModal();
      if (onCancel) onCancel();
    };
    
    overlay.querySelector('.confirm-modal-ok').onclick = () => {
      closeModal();
      if (onConfirm) onConfirm();
    };
    
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });
  }

  // Модальное окно для публичного обсуждения
  async function showDiscussModal(postId, postTitle) {
    // Загружаем существующие сообщения
    let discussions = [];
    try {
      const response = await fetch(`${API_BASE}/post-discussions/${postId}`);
      if (response.ok) {
        discussions = await response.json();
        console.log(`💬 Загружено ${discussions.length} сообщений для поста ${postId}`);
      }
    } catch (e) {
      console.error('Ошибка загрузки обсуждений:', e);
    }
    
    const modal = document.createElement('div');
    modal.className = 'discuss-modal-overlay';
    modal.innerHTML = `
      <div class="discuss-modal">
        <div class="discuss-modal-header">
          <div class="discuss-modal-title">
            <i class="fa-regular fa-comments"></i>
            <span>Обсуждение</span>
          </div>
          <button class="discuss-modal-close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                              <path d="M18 6 6 18"/>
                              <path d="m6 6 12 12"/>
                            </svg>
          </button>
        </div>
        
        <div class="discuss-modal-post-info">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22 6 12 13 2 6"/>
          </svg>
          <span>${escapeHtml(postTitle)}</span>
        </div>
        
        <div class="discuss-modal-messages" id="discussMessagesList"></div>
        
        <div class="discuss-modal-footer">
          <textarea id="discussMessage" rows="3" placeholder="Напишите своё мнение, вопрос или предложение..."></textarea>
          <button id="sendDiscussBtn" class="discuss-send-btn">
            <i class="fa-regular fa-paper-plane"></i> Отправить
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    
    // Рендерим сообщения
    const messagesContainer = modal.querySelector('#discussMessagesList');
    
    function renderMessages() {
      if (discussions.length === 0) {
        messagesContainer.innerHTML = `
          <div class="discuss-message system">
            <div class="discuss-message-avatar">
            </div>
            <div class="discuss-message-content">
              <div class="discuss-message-text">Здесь будут публичные комментарии всех участников. Обсуждайте трек, задавайте вопросы автору, делитесь идеями!</div>
            </div>
          </div>
        `;
        return;
      }
      
      messagesContainer.innerHTML = discussions.map(msg => {
        const isCurrentUser = currentUser && msg.user_id === currentUser.id;
        return `
          <div class="discuss-message ${isCurrentUser ? 'my-message' : ''}" data-message-id="${msg.id}">
            <div class="discuss-message-avatar">
              <div class="default-avatar-small">${(msg.user_name || '?').charAt(0)}</div>
            </div>
            <div class="discuss-message-content">
              <div class="discuss-message-author">
                ${escapeHtml(msg.user_name || 'Участник')}
                <span class="discuss-message-time">${formatMessageTime(msg.created_at)}</span>
                ${isCurrentUser ? `
                  <button class="discuss-message-delete" data-message-id="${msg.id}" title="Удалить сообщение">
                    <i class="fa-regular fa-trash-can"></i>
                  </button>
                ` : ''}
              </div>
              <div class="discuss-message-text">${escapeHtml(msg.message)}</div>
            </div>
          </div>
        `;
      }).join('');
      
      // Добавляем обработчики для кнопок удаления
      messagesContainer.querySelectorAll('.discuss-message-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const messageId = btn.getAttribute('data-message-id');
          
          showConfirmModal({
            title: 'Удаление сообщения',
            message: 'Вы уверены, что хотите удалить это сообщение?',
            confirmText: 'Удалить',
            cancelText: 'Отмена',
            onConfirm: async () => {
              try {
                const response = await fetch(`${API_BASE}/post-discussions/${messageId}`, {
                  method: 'DELETE',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ user_id: currentUser.id })
                });
                
                if (response.ok) {
                  discussions = discussions.filter(m => m.id != messageId);
                  renderMessages();
                } else {
                  const error = await response.json();
                  alert('Ошибка: ' + (error.error || 'Не удалось удалить'));
                }
              } catch (e) {
                console.error('Ошибка удаления:', e);
                alert('Ошибка соединения');
              }
            }
          });
        });
      });
      
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    renderMessages();
    
    // Закрытие
    const closeBtn = modal.querySelector('.discuss-modal-close');
    const closeModal = () => modal.remove();
    closeBtn.onclick = closeModal;
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    
    // Отправка сообщения
    const textarea = modal.querySelector('#discussMessage');
    const sendBtn = modal.querySelector('#sendDiscussBtn');
    
    const sendMessage = async () => {
      const message = textarea.value.trim();
      if (!message) {
        textarea.style.borderColor = '#c2410c';
        textarea.placeholder = 'Пожалуйста, напишите сообщение';
        setTimeout(() => {
          textarea.style.borderColor = '';
          textarea.placeholder = 'Напишите своё мнение, вопрос или предложение...';
        }, 2000);
        return;
      }
      
      if (!currentUser) {
        alert('Войдите в аккаунт, чтобы участвовать в обсуждении');
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE}/post-discussions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            post_id: postId,
            user_id: currentUser.id,
            message: message
          })
        });
        
        if (response.ok) {
          const newMessage = await response.json();
          discussions.push(newMessage);
          renderMessages();
          textarea.value = '';
          textarea.style.height = 'auto';
        } else {
          const error = await response.json();
          alert('Ошибка: ' + (error.error || 'Не удалось отправить сообщение'));
        }
      } catch (e) {
        console.error('Ошибка отправки:', e);
        alert('Ошибка соединения');
      }
    };
    
    sendBtn.onclick = sendMessage;
    textarea.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        sendMessage();
      }
    });
    
    // Автоматический рост текстового поля
    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
  }
  
  // Вспомогательная функция форматирования времени для сообщений
  function formatMessageTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'только что';
    if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
    if (diff < 604800000) return `${Math.floor(diff / 86400000)} д назад`;
    return `${date.getDate()} ${date.toLocaleString('ru', { month: 'short' })}`;
  }
  
  // ========== ПРОСМОТР ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ ==========
  function viewUserProfile(userId) {
    viewingUserId = userId;
    renderUserProfileScreen();
    setActiveScreen('profile');
  }
  
  function renderUserProfileScreen() {
    const user = users.find(u => u.id === viewingUserId);
    if (!user) return;
    
    const container = document.getElementById('profileScreen');
    if (!container) return;
    
    const rating = user.rating || 0;
    const genres = user.genres || '';
    const genreList = genres ? genres.split(',').map(g => g.trim()) : [];
    const daysInCommunity = Math.floor((Date.now() - user.created_at) / (1000 * 60 * 60 * 24));
    const followersCount = user.followers_count || 0;
    const followingCount = user.following_count || 0;
    const isFollow = isFollowing(user.id);
    
    container.innerHTML = `
      <!-- ШАПКА С КНОПКАМИ -->
      <div class="profile-actions-bar">
        <button id="backFromProfileBtn" class="back-to-profile-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Назад
        </button>
        
        <button class="subscribe-action-btn ${isFollow ? 'subscribed' : ''}" id="subscribeActionBtn">
          <i class="fa-${isFollow ? 'solid' : 'regular'} fa-bell${isFollow ? '-slash' : ''}"></i> 
          <span>${isFollow ? 'Отписаться' : 'Подписаться'}</span>
        </button>
      </div>
      
      <!-- КАРТОЧКА ПРОФИЛЯ -->
      <div class="profile-header-card">
        <div class="profile-avatar">${user.name.charAt(0)}</div>
        <div class="profile-name">${escapeHtml(user.name)}</div>
        <div class="profile-bio">${escapeHtml(user.instruments || 'Инструменты не указаны')} ${user.instruments && user.city ? '·' : ''} ${escapeHtml(user.city || 'Город не указан')}</div>
        
        ${genreList.length > 0 ? `<div class="profile-genres">${genreList.map(g => `<span class="genre-badge">${escapeHtml(g)}</span>`).join('')}</div>` : ''}
        
        ${user.about ? `<div class="profile-about">${escapeHtml(user.about)}</div>` : ''}
        
        <div class="profile-rating">
          <i class="fa-solid fa-star rating-star"></i> ${rating} очков репутации
        </div>
        
        <div class="profile-joined">
          в сообществе ${daysInCommunity} ${getDeclension(daysInCommunity, 'день', 'дня', 'дней')}
        </div>

        
                <div class="profile-stats">
                  <div class="stat">
                    <strong>${followersCount}</strong>
                    <span>подписчиков</span>
                  </div>
                  <div class="stat">
                    <strong>${followingCount}</strong>
                    <span>подписок</span>
                  </div>
                </div>        
        
        
        <button class="profile-edit-btn" id="messageToUserBtn">
          <i class="fa-regular fa-message"></i> Написать сообщение
        </button>
      </div>
    `;
    
    // Обработчик кнопки "Назад"
    document.getElementById('backFromProfileBtn').onclick = () => {
      viewingUserId = null;
      setActiveScreen('feed');
      renderFeed();
    };
    
    // Обработчик кнопки "Подписаться/Отписаться"
    document.getElementById('subscribeActionBtn')?.addEventListener('click', async () => {
      if (isFollowing(user.id)) {

  // ========== ПОИСК ==========
  let searchQuery = '';
  let searchTypeFilter = null;
  let searchCity = '';
  let searchGenre = '';
  let searchActiveTab = 'posts';
  
  function performSearch() {
    let filteredPosts = posts.filter(p => p.status === 'active');
    
    if (searchQuery) {
      const query = searchQuery.toLowerCase();
      filteredPosts = filteredPosts.filter(p => 
        p.title.toLowerCase().includes(query) || 
        p.description.toLowerCase().includes(query)
      );
    }
    
    if (searchTypeFilter) {
      filteredPosts = filteredPosts.filter(p => p.type === searchTypeFilter);
    }
    
    if (searchCity) {
      filteredPosts = filteredPosts.filter(p => {
        const author = users.find(u => u.id === p.user_id);
        return author && author.city && author.city.toLowerCase().includes(searchCity.toLowerCase());
      });
    }
    
    if (searchGenre) {
      filteredPosts = filteredPosts.filter(p => {
        const author = users.find(u => u.id === p.user_id);
        return author && author.genres && author.genres.toLowerCase().includes(searchGenre.toLowerCase());
      });
    }
    
    let filteredUsers = users.filter(u => u.id !== currentUser?.id);
    
    if (searchQuery) {
      const query = searchQuery.toLowerCase();
      filteredUsers = filteredUsers.filter(u => 
        u.name.toLowerCase().includes(query) || 
        (u.instruments && u.instruments.toLowerCase().includes(query))
      );
    }
    
    if (searchCity) {
      filteredUsers = filteredUsers.filter(u => 
        u.city && u.city.toLowerCase().includes(searchCity.toLowerCase())
      );
    }
    
    if (searchGenre) {
      filteredUsers = filteredUsers.filter(u => 
        u.genres && u.genres.toLowerCase().includes(searchGenre.toLowerCase())
      );
    }
    
    renderSearchResults(filteredPosts, filteredUsers);
  }

  // ========== UI КОМПОНЕНТЫ ==========

  function formatDate(timestamp) {
    const date = new Date(timestamp);
    return `${date.getDate()} ${date.toLocaleString('ru',{month:'short'})} · ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
  }
  
  function getBadgeHTML(type) {
    const labels = { work: 'вакансия', gear: 'оборудование', discourse: 'дискурс' };
    const classes = { work: 'work', gear: 'gear', discourse: 'discourse' };
    return `<span class="badge-type ${classes[type]}" data-type="${type}">${typeIcons[type]}<span class="badge-text">${labels[type]}</span></span>`;
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }
  
  let currentFilter = null;
  
  async function renderFeed() {
    const container = document.getElementById('feedList');
    if (!container) return;
    
    // Загружаем активные комнаты
    let liveRooms = [];
    try {
      const response = await fetch(`${API_BASE}/live-rooms`);
      if (response.ok) {
        liveRooms = await response.json();
        console.log('🎙️ Загружено комнат:', liveRooms.length);
      }
    } catch (e) {
      console.error('Ошибка загрузки комнат:', e);
    }
    
    let filtered = posts.filter(p => p.status === "active");
    
    // Фильтр по подпискам
    if (currentFeedMode === 'subscriptions' && followingIds.length > 0) {
      filtered = filtered.filter(p => followingIds.includes(p.user_id));
    }
    
    // Существующие фильтры
    if (currentFilter) {
      filtered = filtered.filter(p => p.type === currentFilter);
    }
    if (currentGenreFilter) {
      filtered = filtered.filter(p => {
        const author = users.find(u => u.id === p.user_id);
        return author && author.genres && author.genres.toLowerCase().includes(currentGenreFilter.toLowerCase());
      });
    }
    
    // Сообщение, если в режиме подписок ничего нет
    if (currentFeedMode === 'subscriptions' && filtered.length === 0 && followingIds.length === 0) {
      container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">🔔 Вы ни на кого не подписаны<br><small>Подпишитесь на музыкантов, чтобы видеть их посты здесь</small></div>';
      return;
    }
    
    if (currentFeedMode === 'subscriptions' && filtered.length === 0 && followingIds.length > 0) {
      container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">🔔 Новых постов от подписанных музыкантов пока нет</div>';
      return;
    }
    
    if (filtered.length === 0 && liveRooms.length === 0) {
      container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">Нет публикаций · создайте первую</div>';
      return;
    }
    
    // Формируем HTML: сначала комнаты, потом посты
    let html = '';
    
    // Блок с активными комнатами
    if (liveRooms.length > 0) {
      html += `
        <div class="live-rooms-section">
          <div class="live-rooms-header">
            <span class="live-dot"></span>
            <h3>Сейчас в эфире</h3>
          </div>
          <div class="rooms-list">
            ${liveRooms.map(room => `
              <div class="room-card" data-room-id="${room.id}">
                <div class="room-card-header">
                  <div class="room-card-title">
                    <span class="live-badge">LIVE</span>
                    ${escapeHtml(room.title)}
                  </div>
                  <span class="room-card-listeners">👥 ${room.listeners_count || 0}</span>
                </div>
                <div class="room-card-host">${escapeHtml(room.host_name)}</div>
                <div class="room-card-stats">
                  <span>🎤 ${room.speakers_count || 1} спикеров</span>
                  <span>💬 нажмите, чтобы присоединиться</span>
                </div>

                ${currentUser && room.host_id === currentUser.id ? `
                  <button class="end-room-btn" data-room-id="${room.id}" style="margin-top: 8px; background: #c2410c; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px;">
                    Завершить эфир
                  </button>
                ` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
    
    // Посты
    if (filtered.length > 0) {
      html += filtered.map(post => {
        const authorName = getAuthorName(post.user_id);
        const hasAudio = post.audio_url && post.audio_url !== '';
        
        return `
          <div class="post-card">
            <div class="post-header">
              ${getBadgeHTML(post.type)}
              <span class="verified-mark clickable-name" data-user-id="${post.user_id}">${escapeHtml(authorName)} · проверен</span>
            </div>
            <div class="post-title">${escapeHtml(post.title)}</div>
            <div class="post-meta">${formatDate(post.created_at)}</div>
            <div class="post-desc">${escapeHtml(post.description)}</div>
            ${hasAudio ? `
              <div class="timeline-placeholder" data-post-id="${post.id}" data-audio-url="${post.audio_url}"></div>
            ` : ''}
            <hr />
            <div class="post-actions">
              <div class="chat-action" data-author-id="${post.user_id}" data-author-name="${escapeHtml(authorName)}">
                <i class="fa-regular fa-message"></i> Написать в чат
              </div>
              <div class="discuss-action" data-post-id="${post.id}" data-post-title="${escapeHtml(post.title)}">
                <i class="fa-regular fa-comments"></i> Обсудить
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    container.innerHTML = html;
    
    // Обработчики
    document.querySelectorAll('.chat-action').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const authorId = el.getAttribute('data-author-id');
        const authorName = el.getAttribute('data-author-name');
        showChatModal(authorId, authorName);
      });
    });
  
    document.querySelectorAll('.discuss-action').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const postId = el.getAttribute('data-post-id');
        const postTitle = el.getAttribute('data-post-title');
        showDiscussModal(postId, postTitle);
      });
    });
    
    document.querySelectorAll('.clickable-name').forEach(el => {

        e.stopPropagation();
        const userId = el.getAttribute('data-user-id');
        if (userId) viewUserProfile(userId);
      });
    });
    
    document.querySelectorAll('.filter-badge').forEach(b => {
      const type = b.getAttribute('data-type');
      if (currentFilter === type) b.classList.add('active');
      else b.classList.remove('active');
    });
  
    // Инициализация таймкод-комментариев
    document.querySelectorAll('.timeline-placeholder').forEach(async (placeholder) => {
      const postId = placeholder.getAttribute('data-post-id');
      const audioUrl = placeholder.getAttribute('data-audio-url');
      
      if (placeholder.hasAttribute('data-initialized')) return;
      placeholder.setAttribute('data-initialized', 'true');
      
      setTimeout(() => {
        try {
          const timeline = new TimelineComments(postId, audioUrl, placeholder);

          await fetch(`${API_BASE}/live-rooms/${roomId}/end`, { method: 'PUT' });
          renderFeed(); // обновляем ленту
        }
      });
    });
  }

    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));

    if (activeNav) activeNav.classList.add('active');

      viewingUserId = null;

  function renderProfileTabContent() {
    const content = document.getElementById('profileTabContent');
    if (!content || !currentUser) return;
    
    if (profileActiveTab === 'posts') {
      const userPosts = getUserPosts(currentUser.id, true);
      if (userPosts.length === 0) {
        content.innerHTML = '<div class="empty-state"><i class="fa-regular fa-newspaper"></i><p>У вас пока нет объявлений</p><button class="create-post-hint" id="createPostHint">Создать объявление</button></div>';
        const hintBtn = document.getElementById('createPostHint');
        if (hintBtn) hintBtn.onclick = () => document.getElementById('fabBtn')?.click();
        return;
      }
      
      content.innerHTML = userPosts.map(post => `
        <div class="my-post-card ${post.status === 'deleted' ? 'deleted' : ''}">
          <div class="my-post-header">
            ${getBadgeHTML(post.type)}
            ${post.status === 'deleted' ? '<span class="deleted-badge">Скрыто</span>' : ''}
          </div>
          <div class="my-post-title">${escapeHtml(post.title)}</div>
          <div class="my-post-meta">${formatDate(post.created_at)}</div>
          <div class="my-post-desc">${escapeHtml(post.description)}</div>
          ${post.status === 'active' ? `
            <div class="my-post-actions">
              <button class="action-edit" data-id="${post.id}"><i class="fa-regular fa-pen-to-square"></i> Редактировать</button>
              <button class="action-delete" data-id="${post.id}"><i class="fa-regular fa-trash-can"></i> Удалить</button>
            </div>
          ` : `
            <div class="my-post-note">Объявление скрыто. Чтобы восстановить, обратитесь в поддержку.</div>
          `}
        </div>
      `).join('');
      
      document.querySelectorAll('.action-edit').forEach(btn => {
        btn.addEventListener('click', async () => {
          const postId = btn.getAttribute('data-id');
          const post = posts.find(p => p.id === postId);
          if (post) showEditPostModal(post);
        });
      });
      
      document.querySelectorAll('.action-delete').forEach(btn => {
        btn.addEventListener('click', async () => {
          const postId = btn.getAttribute('data-id');
          if (confirm('Удалить объявление?')) {
            await deletePost(postId);
            await loadPosts();
            renderProfileScreen();
            renderFeed();
          }
        });
      });
    } else if (profileActiveTab === 'invites') {
      const invitedUsers = getInvitedUsers();
      const availableCount = getAvailableInvitesCount();
      
      content.innerHTML = `
        <div class="invites-stats">
          <div class="invites-count">Доступно инвайтов: <strong>${availableCount}</strong></div>
          <p class="invites-hint">1 базовый + 1 за каждого приглашённого</p>
          <button id="generateInviteFromProfile" class="invite-generate-btn"><i class="fa-regular fa-plus"></i> Создать инвайт-код</button>
          <div id="newInviteResult" class="invite-result"></div>
        </div>
        <div class="invited-list">
          <h4>Приглашённые вами</h4>
          ${invitedUsers.length === 0 ? '<p class="empty-invites">Пока никого не пригласили</p>' : 
            invitedUsers.map(u => `<div class="invited-item"><i class="fa-regular fa-user"></i><div><strong>${escapeHtml(u.name)}</strong><div class="invited-details">${escapeHtml(u.instruments || '')} ${escapeHtml(u.city ? '· ' + u.city : '')}</div></div></div>`).join('')}
        </div>
      `;
      
      const generateInviteBtn = document.getElementById('generateInviteFromProfile');
      if (generateInviteBtn) {
        generateInviteBtn.onclick = async () => {
          const newCode = await createInvite();
          if (newCode) {
            const resultDiv = document.getElementById('newInviteResult');
            resultDiv.innerHTML = `<div class="invite-code-block"><code>${newCode}</code><button class="copy-code-btn">Копировать</button></div>`;
            resultDiv.querySelector('.copy-code-btn').onclick = () => {
              navigator.clipboard.writeText(newCode);
              alert('Код скопирован!');
            };
            setTimeout(() => {
              if (resultDiv) resultDiv.innerHTML = '';
            }, 15000);
          } else {
            alert('Не удалось создать инвайт');
          }
        };
      }
    }
  }
  
  function showEditPostModal(post) {
    const modalHtml = `
      <div class="modal" id="editPostModal" style="display: flex;">
        <div class="modal-card">
          <h3>Редактировать объявление</h3>
          <div class="form-group"><label>Заголовок</label><input type="text" id="editPostTitle" value="${escapeHtml(post.title)}"></div>
          <div class="form-group"><label>Описание</label><textarea id="editPostDesc" rows="4">${escapeHtml(post.description)}</textarea></div>
          <div class="form-group"><label>Теги (через запятую)</label><input type="text" id="editPostTags" value="${(post.tags || []).join(', ')}"></div>
          <div class="modal-buttons">
            <button class="btn-secondary" id="cancelEditPost">Отмена</button>
            <button class="btn-primary" id="saveEditPost">Сохранить</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    const modal = document.getElementById('editPostModal');
    
    document.getElementById('cancelEditPost').onclick = () => modal.remove();
    document.getElementById('saveEditPost').onclick = async () => {
      const title = document.getElementById('editPostTitle').value.trim();
      const description = document.getElementById('editPostDesc').value.trim();
      const tagsRaw = document.getElementById('editPostTags').value;
      const tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t);
      
      if (!title || !description) {
        alert('Заголовок и описание обязательны');
        return;
      }
      
      await updatePost(post.id, { title, description, tags });
      await loadPosts();
      modal.remove();
      renderProfileScreen();
      renderFeed();
    };
  }

    const root = document.getElementById('appRoot');

          </div>
        </div>
      `;
      
      document.getElementById('doLoginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
          document.getElementById('authError').innerText = 'Заполните email и пароль';
          return;
        }
        
        const result = await login(email, password);
        if (result.success) {
          currentUser = result.user;
          saveAllData();
          await loadPosts();
          renderMainApp();
        } else {
          document.getElementById('authError').innerText = result.error;
        }
      };
      
      document.getElementById('showRegisterBtn').onclick = () => {
        authMode = 'register';
        showAuthScreen();
      };
      
      document.getElementById('forgotLink').onclick = (e) => {
        e.preventDefault();
        authMode = 'forgot';
        showAuthScreen();
      };
      
    } else if (authMode === 'register') {
      root.innerHTML = `
        <div class="access-screen">
          <div class="access-card" style="max-width: 450px;">
            <h2 style="color: var(--accent); text-align: center;">Регистрация</h2>

            <div class="form-group"><label>Пароль</label><input type="password" id="regPassword" placeholder="минимум 6 символов"></div>
            <div class="form-group"><label>Имя и фамилия</label><input type="text" id="regName" placeholder="Как к вам обращаться?"></div>
            <div class="form-group">
              <label> Инвайт-код <span class="accent-text">(обязательно)</span></label>
              <input type="text" id="regInviteCode" placeholder="Код от участника сообщества" class="accent-input">
            </div>
            
            <button id="doRegisterBtn" class="btn-primary" style="width:100%;">Зарегистрироваться</button>
            <button id="backToLoginBtn" class="btn-secondary" style="width:100%; margin-top:12px;">← Назад ко входу</button>
            
            <div id="regError" style="margin-top:12px; font-size:13px; color:#c2410c; text-align:center;"></div>
          </div>
        </div>
      `;
      
      document.getElementById('doRegisterBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const name = document.getElementById('regName').value.trim();
        const inviteCode = document.getElementById('regInviteCode').value.trim().toUpperCase();
        
        if (!email || !password || !name || !inviteCode) {
          document.getElementById('regError').innerText = 'Заполните все поля';
          return;
        }
        
        if (password.length < 6) {
          document.getElementById('regError').innerText = 'Пароль должен быть не менее 6 символов';
          return;
        }
        
        const result = await register(email, password, name, inviteCode, '', '', '', '');
        if (result.success) {
          currentUser = result.user;
          saveAllData();
          await loadPosts();
          renderMainApp();
        } else {
          document.getElementById('regError').innerText = result.error;
        }
      };
      
      document.getElementById('backToLoginBtn').onclick = () => {
        authMode = 'login';
        showAuthScreen();
      };
      
    } else if (authMode === 'forgot') {
      root.innerHTML = `<div class="access-screen"><div class="access-card"><h2>Восстановление</h2><p>Демо-режим</p><button onclick="location.reload()">Назад</button></div></div>`;

    }
  }

  async function loadFollowing() {
    if (!currentUser) return;
    try {
      const response = await fetch(`${API_BASE}/follow/following/${currentUser.id}`);
      if (response.ok) {
        const data = await response.json();
        followingIds = data.map(u => u.id);
        console.log('📋 Загружены подписки:', followingIds.length);
      }
    } catch (e) {
      console.error('Ошибка загрузки подписок:', e);
      followingIds = [];
    }
  }
  
  // Подписаться
  async function followUser(userId) {
    if (!currentUser) return false;
    try {
      const response = await fetch(`${API_BASE}/follow`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ follower_id: currentUser.id, following_id: userId })
      });
      if (response.ok) {
        followingIds.push(userId);
        // Обновляем счётчики в users
        const userIndex = users.findIndex(u => u.id === userId);
        if (userIndex !== -1) {
          users[userIndex].followers_count = (users[userIndex].followers_count || 0) + 1;
        }
        if (currentUser.id === userId) {
          currentUser.following_count = (currentUser.following_count || 0) + 1;
        }
        renderProfileScreen();
        renderFeed();
        return true;
      }
    } catch (e) {
      console.error('Ошибка подписки:', e);
    }
    return false;
  }
  
  // Отписаться
  async function unfollowUser(userId) {
    if (!currentUser) return false;
    try {
      const response = await fetch(`${API_BASE}/follow`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ follower_id: currentUser.id, following_id: userId })
      });
      if (response.ok) {
        followingIds = followingIds.filter(id => id !== userId);
        const userIndex = users.findIndex(u => u.id === userId);
        if (userIndex !== -1) {
          users[userIndex].followers_count = Math.max(0, (users[userIndex].followers_count || 0) - 1);
        }
        renderProfileScreen();
        renderFeed();
        return true;
      }
    } catch (e) {
      console.error('Ошибка отписки:', e);
    }
    return false;
  }
  
  // Проверить, подписан ли на пользователя
  function isFollowing(userId) {
    return followingIds.includes(userId);
  }

    navItems.forEach(btn => {

        if (targetScreen) targetScreen.classList.add('active');
        
        if (screen === 'profile') {

          renderProfileScreen();
        }
        
        if (screen === 'search') {

        }
      });
    });
    
    document.querySelectorAll('.filter-badge').forEach(b => {
      b.addEventListener('click', () => {

        currentFilter = currentFilter === type ? null : type;
        renderFeed();
      });
    });
    
    document.querySelectorAll('.genre-filter-btn').forEach(btn => {

        const genre = btn.getAttribute('data-genre');
        currentGenreFilter = genre === '' ? null : genre;
        renderFeed();
        document.querySelectorAll('.genre-filter-btn').forEach(b => b.classList.remove('active'));

      });
    });
    
    const resetBtn = document.getElementById('resetFilterBtn');

    document.addEventListener('click', (e) => {
      const badge = e.target.closest('.badge-type');
      if (badge && badge.getAttribute('data-type')) {
        const type = badge.getAttribute('data-type');
        currentFilter = currentFilter === type ? null : type;
        renderFeed();
      }
    });
    
    const fab = document.getElementById('fabBtn');
    const modal = document.getElementById('createModal');
    if (fab && modal) {
      fab.onclick = () => modal.style.display = 'flex';
      document.getElementById('cancelPost').onclick = () => modal.style.display = 'none';
      
      let uploadedAudioUrl = null;
      const audioInput = document.getElementById('postAudio');
      const progressDiv = document.getElementById('audioUploadProgress');
      
      audioInput.addEventListener('change', async (e) => {
        const selectedFile = e.target.files[0];
        if (!selectedFile) return;
        
        if (selectedFile.size > 5 * 1024 * 1024) {
          progressDiv.innerHTML = '<span style="color:#c2410c;">Файл больше 5 MB</span>';
          audioInput.value = '';
          return;
        }
        
        progressDiv.innerHTML = '⏳ Загрузка...';
        const result = await uploadAudio(selectedFile);
        if (result.success) {
          uploadedAudioUrl = result.audioUrl;
          progressDiv.innerHTML = 'Демо загружено';
          // Показываем имя файла
          const fileNameSpan = document.getElementById('audioFileName');
          if (fileNameSpan) fileNameSpan.textContent = selectedFile.name;
        } else {
          progressDiv.innerHTML = '<span style="color:#c2410c;">Ошибка загрузки</span>';
          audioInput.value = '';
        }
      });
      
      document.getElementById('submitPost').onclick = async () => {
        const type = document.getElementById('postType').value;
        const title = document.getElementById('postTitle').value.trim();
        const desc = document.getElementById('postDesc').value.trim();
        const tags = document.getElementById('postTags').value;
        
        if (!title || !desc) { 
          alert('Заголовок и описание обязательны'); 
          return; 
        }
        
        await addPost(type, title, desc, tags, uploadedAudioUrl);
        await loadPosts();
        modal.style.display = 'none';
        document.getElementById('postTitle').value = '';
        document.getElementById('postDesc').value = '';
        document.getElementById('postTags').value = '';
        audioInput.value = '';
        uploadedAudioUrl = null;
        progressDiv.innerHTML = '';
        renderFeed();
        setActiveScreen('feed');
      };
      
      window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    }
    
    const hamburger = document.getElementById('hamburgerBtn');
    const menu = document.getElementById('sideMenu');
    const overlay = document.getElementById('menuOverlay');
    if (hamburger && menu && overlay) {
      hamburger.onclick = () => { menu.classList.add('open'); overlay.style.display = 'block'; };
      overlay.onclick = () => { menu.classList.remove('open'); overlay.style.display = 'none'; };
    }
    
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const action = item.getAttribute('data-action');
        const menuEl = document.getElementById('sideMenu');
        const overlayEl = document.getElementById('menuOverlay');
        if (menuEl) menuEl.classList.remove('open');
        if (overlayEl) overlayEl.style.display = 'none';
        
        if (action === 'logout') {
          currentUser = null;
          localStorage.removeItem('backstage_current_user');
          authMode = 'login';
          showAuthScreen();
        } else if (action === 'profile') {
          viewingUserId = null;
          setActiveScreen('profile');
          renderProfileScreen();
        } else if (action === 'invites') {
          viewingUserId = null;
          setActiveScreen('profile');
          profileActiveTab = 'invites';
          renderProfileScreen();
        } else if (action === 'notifications') {
          alert('Уведомления скоро появятся');
        } else if (action === 'about') {
          window.location.href = 'about.html';
        } else if (action === 'live') {
          showCreateRoomModal();
        }
      });
    });

    // Переключение вкладок подписок
    const feedTabs = document.querySelectorAll('.feed-tab');
    feedTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const mode = tab.getAttribute('data-feed');
        if (mode === 'subscriptions') {
          currentFeedMode = 'subscriptions';
        } else {
          currentFeedMode = 'all';
        }
        
        feedTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderFeed();
      });
    });
  }

  // ========== МОДУЛЬ ТАЙМКОД-КОММЕНТАРИЕВ (с поддержкой диапазонов) ==========
  class TimelineComments {
    constructor(postId, audioUrl, containerElement) {
      this.postId = postId;
      this.audioUrl = audioUrl;
      this.container = containerElement;
      this.wavesurfer = null;
      this.comments = [];
      this.currentTime = 0;
      
      // Для выделения диапазона
      this.isDragging = false;
      this.dragStartX = 0;
      this.dragStartTime = 0;
      this.rangeSelection = null;
      
      // Сохраняем экземпляр в DOM
      containerElement.__timelineInstance = this;
      
      // Запускаем инициализацию
      this.init();
    }
  
    formatTime(seconds) {
      if (isNaN(seconds) || seconds === undefined || seconds === null) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
  
    formatDate(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
      return `${date.getDate()} ${date.toLocaleString('ru', { month: 'short' })}`;
    }
  
    async loadComments() {
      try {
        const url = `${API_BASE}/timeline-comments/${this.postId}${currentUser ? `?userId=${currentUser.id}` : ''}`;
        const response = await fetch(url);
        if (response.ok) {
          this.comments = await response.json();
          console.log(`📝 Загружено ${this.comments.length} комментариев для поста ${this.postId}`);
          
          // Обновляем список комментариев
          const listContainer = this.container.querySelector('.timeline-comments-list');
          if (listContainer) {
            this.renderCommentsList(listContainer);
          }
        } else {
          this.comments = [];
        }
      } catch (e) {
        console.error('Ошибка загрузки комментариев:', e);
        this.comments = [];
      }
    }
  
    async addComment(startTime, endTime, text) {
      if (!currentUser) {
        alert('Войдите в аккаунт, чтобы комментировать');
        return false;
      }
      if (!text.trim()) return false;
  
      try {
        const response = await fetch(`${API_BASE}/timeline-comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            post_id: this.postId,
            user_id: currentUser.id,
            start_time: startTime,
            end_time: endTime || null,
            comment_text: text.trim()
          })
        });
  
        if (response.ok) {
          const newComment = await response.json();
          this.comments.push(newComment);
          const listContainer = this.container.querySelector('.timeline-comments-list');
          if (listContainer) this.renderCommentsList(listContainer);
          return true;
        } else {
          const error = await response.json();
          alert('Ошибка: ' + (error.error || 'Не удалось добавить комментарий'));
        }
      } catch (e) {
        console.error('Ошибка добавления комментария:', e);
        alert('Ошибка соединения');
      }
      return false;
    }
  
    async likeComment(commentId) {
      if (!currentUser) {
        alert('Войдите в аккаунт');
        return;
      }
  
      try {
        const response = await fetch(`${API_BASE}/comment-likes/${commentId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: currentUser.id })
        });
  
        if (response.ok) {
          await this.loadComments();
        }
      } catch (e) {
        console.error('Ошибка лайка:', e);
      }
    }
  
    async deleteComment(commentId) {
      if (!currentUser) return;
      if (!confirm('Удалить комментарий?')) return;
  
      try {
        const response = await fetch(`${API_BASE}/timeline-comments/${commentId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: currentUser.id })
        });
  
        if (response.ok) {
          await this.loadComments();
        } else {
          const error = await response.json();
          alert('Ошибка: ' + (error.error || 'Не удалось удалить'));
        }
      } catch (e) {
        console.error('Ошибка удаления:', e);
      }
    }

    showCommentModal(startTime, endTime, isRange) {
      return new Promise((resolve) => {
        // Создаём оверлей
        const overlay = document.createElement('div');
        overlay.className = 'comment-modal-overlay';
        
        const timeDisplay = isRange 
          ? `${this.formatTime(startTime)} → ${this.formatTime(endTime)}`
          : this.formatTime(startTime);
        
        const modalHtml = `
          <div class="comment-modal">
            <div class="comment-modal-header">
              <h3>${isRange ? 'Комментарий к диапазону' : 'Комментарий к моменту'}</h3>
              <button class="comment-modal-close">&times;</button>
            </div>
            ${isRange ? `
              <div class="comment-modal-range-badge">Выделено: ${timeDisplay}
              </div>
            ` : `
              <div class="comment-modal-time">
                <span>${timeDisplay}</span>
              </div>
            `}
            <div class="comment-modal-body">
              <textarea class="comment-modal-textarea" placeholder="Напишите свой комментарий..."></textarea>
            </div>
            <div class="comment-modal-footer">
              <button class="comment-modal-cancel">Отмена</button>
              <button class="comment-modal-submit">Отправить</button>
            </div>
          </div>
        `;
        
        overlay.innerHTML = modalHtml;
        document.body.appendChild(overlay);
        
        const textarea = overlay.querySelector('.comment-modal-textarea');
        const closeBtn = overlay.querySelector('.comment-modal-close');
        const cancelBtn = overlay.querySelector('.comment-modal-cancel');
        const submitBtn = overlay.querySelector('.comment-modal-submit');
        
        // Фокус на текстовое поле
        setTimeout(() => textarea.focus(), 100);
        
        const closeModal = () => {
          overlay.remove();
          resolve(null);
        };
        
        const submit = () => {
          const text = textarea.value.trim();
          if (text) {
            overlay.remove();
            resolve(text);
          } else {
            textarea.style.borderColor = '#c2410c';
            textarea.placeholder = 'Пожалуйста, напишите комментарий';
          }
        };
        
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        submitBtn.addEventListener('click', submit);
        
        // Закрытие по клику на оверлей
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) closeModal();
        });
        
        // Enter + Ctrl/Cmd для отправки
        textarea.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            submit();
          }
        });
      });
    }
  
    seekToTime(seconds) {
      if (this.wavesurfer) {
        const duration = this.wavesurfer.getDuration();
        if (duration > 0) {
          this.wavesurfer.seekTo(seconds / duration);
          this.wavesurfer.play();
        }
      }
    }
  
    playRange(startTime, endTime) {
      if (this.wavesurfer) {
        this.wavesurfer.seekTo(startTime / this.wavesurfer.getDuration());
        this.wavesurfer.play();
        
        const stopAtEnd = () => {
          if (this.wavesurfer.getCurrentTime() >= endTime) {
            this.wavesurfer.pause();
            this.wavesurfer.un('audioprocess', stopAtEnd);
          }
        };
        this.wavesurfer.on('audioprocess', stopAtEnd);
      }
    }
  
    updateTimeBadge() {
      const badge = this.container.querySelector('.current-time-value');
      if (badge) badge.textContent = this.formatTime(this.currentTime);
    }
  
    updatePlayButtonIcon() {
      const playBtn = this.container.querySelector('.waveform-play-btn');
      if (playBtn && this.wavesurfer) {
        const icon = playBtn.querySelector('i');
        if (icon) {
          icon.className = this.wavesurfer.isPlaying() ? 'fa-solid fa-pause' : 'fa-solid fa-play';
        }
      }
    }

    // Остановить и перемотать в начало
    stopAndReset() {
      if (this.wavesurfer) {
        this.wavesurfer.stop();
        this.currentTime = 0;
        this.updateTimeBadge();
        this.updatePlayButtonIcon();
      }
    }
    
    // Перемотка назад на X секунд
    // Перемотка назад на X секунд
    rewind(seconds = 10) {
      if (this.wavesurfer) {
        const newTime = Math.max(0, this.wavesurfer.getCurrentTime() - seconds);
        this.wavesurfer.seekTo(newTime / this.wavesurfer.getDuration());
        this.updateTimeBadge();
      }
    }
    
    // Перемотка на 1 секунду назад
    rewind1() {
      this.rewind(1);
    }
    
    // Перемотка вперёд на X секунд
    forward(seconds = 10) {
      if (this.wavesurfer) {
        const duration = this.wavesurfer.getDuration();
        const newTime = Math.min(duration, this.wavesurfer.getCurrentTime() + seconds);
        this.wavesurfer.seekTo(newTime / duration);
        this.updateTimeBadge();
      }
    }
    
    // Перемотка на 1 секунду вперёд
    forward1() {
      this.forward(1);
    }
  
    renderCommentsList(listContainer) {
      if (!listContainer) return;
  
      // Проверяем, не скрыл ли пользователь подсказку навсегда
      const hintDismissed = localStorage.getItem('chiuso_timeline_hint_dismissed');
      
      // Если есть комментарии — показываем их
      if (this.comments.length > 0) {
        const sortedComments = [...this.comments].sort((a, b) => a.start_time - b.start_time);
        
        listContainer.innerHTML = sortedComments.map(comment => {
          const isLiked = comment.is_liked === 1 || comment.is_liked === true;
          const isAuthor = currentUser && comment.user_id === currentUser.id;
          
          const timeDisplay = comment.end_time && comment.end_time !== comment.start_time
            ? `${this.formatTime(comment.start_time)} → ${this.formatTime(comment.end_time)}`
            : this.formatTime(comment.start_time);
          
          const rangeClass = comment.end_time && comment.end_time !== comment.start_time ? 'range-comment' : 'point-comment';
          
          return `
            <div class="timeline-comment ${rangeClass}" data-start-time="${comment.start_time}" data-end-time="${comment.end_time || ''}">
              <div class="comment-timestamp">${timeDisplay}</div>
              <div class="comment-content">
                <div class="comment-author">
                  ${escapeHtml(comment.author_name || 'Участник')}
                  <span>${this.formatDate(comment.created_at)}</span>
                </div>
                <div class="comment-text">${escapeHtml(comment.comment_text)}</div>
                <div class="comment-actions">
                  <button class="comment-like-btn ${isLiked ? 'liked' : ''}" data-comment-id="${comment.id}">
                    <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> ${comment.likes_count || 0}
                  </button>
                  ${isAuthor ? `
                    <button class="comment-delete-btn-global" data-comment-id="${comment.id}">
                      <i class="fa-regular fa-trash-can"></i> Удалить
                    </button>
                  ` : ''}
                </div>
              </div>
            </div>
          `;
        }).join('');
  
        // При клике на комментарий — перематываем трек
        listContainer.querySelectorAll('.timeline-comment').forEach(el => {
          el.addEventListener('click', (e) => {
            if (e.target.closest('.comment-like-btn') || e.target.closest('.comment-delete-btn-global')) return;
            const startTime = parseFloat(el.getAttribute('data-start-time'));
            const endTime = el.getAttribute('data-end-time');
            
            if (endTime && parseFloat(endTime) !== startTime) {
              this.playRange(startTime, parseFloat(endTime));
            } else {
              this.seekToTime(startTime);
            }
          });
        });
  
        // Лайки
        listContainer.querySelectorAll('.comment-like-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const commentId = btn.getAttribute('data-comment-id');
            await this.likeComment(commentId);
          });
        });
  
        // Удаление
        listContainer.querySelectorAll('.comment-delete-btn-global').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const commentId = btn.getAttribute('data-comment-id');
            await this.deleteComment(commentId);
          });
        });
        
        return;
      }
      
      // Если комментариев нет и подсказка не скрыта навсегда — показываем её

        listContainer.innerHTML = `

            </svg>
            <div class="timeline-empty-title">Как это работает</div>
            <div class="timeline-empty-steps">

    initWaveSurfer() {
      const waveformDiv = this.container.querySelector('#waveform');
      if (!waveformDiv) {
        console.error('Waveform контейнер не найден');
        return;
      }
  
      if (typeof WaveSurfer === 'undefined') {
        console.error('WaveSurfer не загружен');
        return;
      }
  
      this.wavesurfer = WaveSurfer.create({
        container: waveformDiv,
        waveColor: '#d4cdc4',
        progressColor: '#d96c4a',
        cursorColor: '#d96c4a',
        barWidth: 2,
        barGap: 1,
        height: 80,
        normalize: true,
        responsive: true
      });
  
      this.wavesurfer.load(this.audioUrl);
  
      this.wavesurfer.on('ready', () => {
        const duration = this.wavesurfer.getDuration();
        const totalSpan = this.container.querySelector('.total-time-value');
        if (totalSpan) totalSpan.textContent = `/ ${this.formatTime(duration)}`;
        console.log('🎵 Waveform готов');
      });
  
      this.wavesurfer.on('audioprocess', () => {
        this.currentTime = this.wavesurfer.getCurrentTime();
        this.updateTimeBadge();
        this.updatePlayButtonIcon();
      });
  
      this.wavesurfer.on('finish', () => {
        this.updatePlayButtonIcon();
      });
  
      // ========== ОБРАБОТЧИКИ ДЛЯ ВЫДЕЛЕНИЯ ДИАПАЗОНА ==========
      
      waveformDiv.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        if (!this.wavesurfer) return;
        
        e.preventDefault();
        
        this.isDragging = true;
        const rect = waveformDiv.getBoundingClientRect();
        this.dragStartX = e.clientX;
        const percentage = Math.max(0, Math.min(1, (this.dragStartX - rect.left) / rect.width));
        this.dragStartTime = percentage * this.wavesurfer.getDuration();
        
        this.rangeSelection = document.createElement('div');
        this.rangeSelection.className = 'waveform-range-selection';
        this.rangeSelection.style.left = `${this.dragStartX - rect.left}px`;
        this.rangeSelection.style.width = '0px';
        waveformDiv.appendChild(this.rangeSelection);
        
        document.body.style.userSelect = 'none';
      });
      
      waveformDiv.addEventListener('mousemove', (e) => {
        if (!this.isDragging || !this.rangeSelection) return;
        
        const rect = waveformDiv.getBoundingClientRect();
        const currentX = e.clientX;
        const startXRelative = this.dragStartX - rect.left;
        const currentXRelative = currentX - rect.left;
        let width = currentXRelative - startXRelative;
        
        if (width > 0) {
          this.rangeSelection.style.left = `${startXRelative}px`;
          this.rangeSelection.style.width = `${width}px`;
        } else {
          this.rangeSelection.style.left = `${currentXRelative}px`;
          this.rangeSelection.style.width = `${-width}px`;
        }
      });
      
      waveformDiv.addEventListener('mouseup', async (e) => {
        if (!this.isDragging) return;
        this.isDragging = false;
        
        if (this.rangeSelection) {
          this.rangeSelection.remove();
          this.rangeSelection = null;
        }
        
        document.body.style.userSelect = '';
        
        const rect = waveformDiv.getBoundingClientRect();
        const endX = e.clientX;
        const startPercentage = Math.max(0, Math.min(1, (this.dragStartX - rect.left) / rect.width));
        const endPercentage = Math.max(0, Math.min(1, (endX - rect.left) / rect.width));
        
        const startTime = Math.min(this.dragStartTime, endPercentage * this.wavesurfer.getDuration());
        const endTime = Math.max(this.dragStartTime, endPercentage * this.wavesurfer.getDuration());
        const rangeDuration = endTime - startTime;
        
        // Если диапазон меньше 0.1 секунды — это точка
        if (rangeDuration < 0.1) {
          const comment = await this.showCommentModal(startTime, null, false);
          if (comment) await this.addComment(startTime, null, comment);
        } else {
          const comment = await this.showCommentModal(startTime, endTime, true);
          if (comment) await this.addComment(startTime, endTime, comment);
        }
      });
      
      document.addEventListener('mouseup', () => {
        if (this.isDragging) {
          this.isDragging = false;
          if (this.rangeSelection) {
            this.rangeSelection.remove();
            this.rangeSelection = null;
          }
          document.body.style.userSelect = '';
        }
      });
  
      // Тултип при наведении
      waveformDiv.addEventListener('mousemove', (e) => {
        if (this.isDragging) return;
        if (!this.wavesurfer || !this.wavesurfer.getDuration()) return;
        
        const rect = waveformDiv.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percentage = Math.max(0, Math.min(1, clickX / rect.width));
        const seconds = percentage * this.wavesurfer.getDuration();
        
        let tooltip = waveformDiv.querySelector('.waveform-tooltip');
        if (!tooltip) {
          tooltip = document.createElement('div');
          tooltip.className = 'waveform-tooltip';
          waveformDiv.style.position = 'relative';
          waveformDiv.appendChild(tooltip);
        }
        tooltip.textContent = this.formatTime(seconds);
        tooltip.style.left = `${clickX}px`;
        tooltip.style.top = '-20px';
      });
  
      waveformDiv.addEventListener('mouseleave', () => {
        const tooltip = waveformDiv.querySelector('.waveform-tooltip');
        if (tooltip) tooltip.remove();
      });
    }

  // Открыть комнату
  async function openRoom(roomId, isHost = false) {
    try {
      const response = await fetch(`${API_BASE}/live-rooms/${roomId}`);
      if (!response.ok) throw new Error('Комната не найдена');
      const room = await response.json();
      currentRoom = room;
      
      // Загружаем сообщения чата
      const messagesResponse = await fetch(`${API_BASE}/room-messages/${roomId}`);
      const messages = await messagesResponse.json();
      
      // Загружаем донаты
      const donationsResponse = await fetch(`${API_BASE}/room-donations/${roomId}`);
      const donations = await donationsResponse.json();
      
      renderRoomScreen(room, isHost, messages, donations);
      setActiveScreen('room');
      
      // Подключаем WebSocket
      initRoomSocket(roomId, isHost);
      
    } catch (e) {
      console.error(e);
      alert('Не удалось загрузить комнату');
    }
  }
  
  // Инициализация WebSocket для комнаты
  function initRoomSocket(roomId, isHost) {
    if (currentSocket) {
      currentSocket.disconnect();
    }
    
    currentSocket = io();
    
    currentSocket.on('connect', () => {
      console.log('🔗 WebSocket подключён');
      currentSocket.emit('join-room', roomId, currentUser.id, currentUser.name);
    });
    
    // Обработка сигналов WebRTC
    currentSocket.on('webrtc-offer', async (data) => {
      if (!isHost && data.targetId === currentUser.id) {
        console.log('📡 Получен offer, создаём answer');
        
        const peer = new SimplePeer({ trickle: false });
        
        peer.on('signal', (signalData) => {
          currentSocket.emit('webrtc-answer', {
            roomId: roomId,
            signal: signalData,
            targetId: data.from
          });
        });
        
        peer.on('stream', (stream) => {
          console.log('🎧 Аудио поток получен!');
          const audio = new Audio();
          audio.srcObject = stream;
          audio.autoplay = true;
          audio.volume = 0.8;
          
          const audioStatus = document.getElementById('audioStatus');
          if (audioStatus) {
            audioStatus.innerHTML = '<i class="fa-solid fa-headphones"></i> 🎵 Трансляция идёт';
            audioStatus.style.color = '#2f6b47';
          }
        });
        
        peer.signal(data.signal);
        peerInstances.set('listener', peer);
      }
    });
    
    currentSocket.on('webrtc-answer', (data) => {
      if (isHost && data.targetId === currentUser.id) {
        console.log('📡 Получен answer');
        const peer = peerInstances.get(data.from);
        if (peer) {
          peer.signal(data.signal);
        }
      }
    });
    
    currentSocket.on('broadcast-started', () => {
      if (!isHost) {
        console.log('🎙️ Трансляция начата, соединяемся...');
        joinBroadcast(currentRoom.host_id);
      }
    });
    
    currentSocket.on('broadcast-stopped', () => {
      if (!isHost) {
        console.log('🔇 Трансляция остановлена');
        leaveBroadcast();
      }
    });
    
    currentSocket.on('listener-ready', (data) => {
      if (isHost && isBroadcasting) {
        console.log(`👂 Новый слушатель: ${data.userName}, создаём peer`);
        createPeerForListener(data.userId, data.userName);
      }
    });
    
    currentSocket.on('new-chat-message', (data) => {
      if (data.user_id !== currentUser.id) {
        addRoomMessageToUI(data);
      }
    });
    
    currentSocket.on('new-donation', (data) => {
      addDonationToUI(data);
    });
    
    currentSocket.on('user-joined', (data) => {
      addSystemMessageToUI(`${data.userName} присоединился к концерту`);
      updateRoomListenersCount();
      
      // Если хост уже вещает, сообщаем новому слушателю
      if (isHost && isBroadcasting && currentSocket) {
        currentSocket.emit('listener-ready', { userId: data.userId, userName: data.userName });
      }
    });
    
    currentSocket.on('user-left', (data) => {
      addSystemMessageToUI(`${data.userName} покинул концерт`);
      updateRoomListenersCount();
    });
  }
